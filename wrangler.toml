name = "zero-dollar-budget-tracker"
compatibility_date = "2025-05-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "budget-db"
database_id = "c080be31-b0a4-4efc-936f-d120c109a3d5"
migrations_dir = "drizzle/migrations"

[[kv_namespaces]]
binding = "KV"
id = "b0924f4e922b4bf29ee00175a144bead"
preview_id = "3e40b18e74144b0e9a00bd1a04517675"

[[r2_buckets]]
binding = "R2"
bucket_name = "budget-receipts"

[ai]
binding = "AI"

[vars]
BETTER_AUTH_URL = "https://zero-dollar-budget-tracker.rcormier.workers.dev"

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1

[triggers]
crons = ["0 5 * * *"]
